<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #1e1f29;
  color: #f8f8f2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  background: #282a36;
  border-bottom: 1px solid #44475a;
  flex-shrink: 0;
  min-height: 36px;
}

#toolbar .logo {
  font-weight: 700;
  color: #bd93f9;
  font-size: 14px;
  letter-spacing: 1px;
  margin-right: 4px;
}

#scene-select {
  background: #383a4a;
  color: #f8f8f2;
  border: 1px solid #44475a;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
#scene-select:focus { outline: 1px solid #bd93f9; }

.btn {
  background: #44475a;
  color: #f8f8f2;
  border: none;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s;
}
.btn:hover { background: #6272a4; }
.btn.primary { background: #6272a4; }
.btn.primary:hover { background: #bd93f9; color: #282a36; }

#save-indicator {
  font-size: 11px;
  color: #6272a4;
  margin-left: 4px;
}
#save-indicator.saving { color: #f1fa8c; }
#save-indicator.saved { color: #50fa7b; }
#save-indicator.error { color: #ff5555; }

#cursor-info {
  margin-left: auto;
  font-size: 11px;
  color: #6272a4;
}

#container-wrap {
  position: relative;
  flex-shrink: 0;
}

#container-display {
  background: #383a4a;
  color: #f8f8f2;
  border: 1px solid #44475a;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  max-width: 180px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
}
#container-display:hover { border-color: #bd93f9; }
#container-display.open  { border-color: #bd93f9; outline: 1px solid #bd93f9; }

#container-panel {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 260px;
  max-height: 420px;
  overflow-y: auto;
  background: #282a36;
  border: 1px solid #44475a;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  z-index: 200;
  padding: 4px 0;
}
#container-panel.open { display: block; }

.co-item {
  display: flex;
  align-items: center;
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #f8f8f2;
  gap: 4px;
}
.co-item:hover { background: #383a4a; }
.co-item.co-full { color: #6272a4; font-size: 13px; padding: 5px 10px; }
.co-item.co-full:hover { color: #f8f8f2; background: #383a4a; }

.co-toggle {
  flex-shrink: 0;
  width: 14px;
  font-size: 9px;
  color: #6272a4;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
  text-align: center;
}
.co-toggle.expanded { color: #bd93f9; }

.co-label {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.co-children { }
.co-children.collapsed > .co-item,
.co-children.collapsed > .co-children { display: none; }

.toolbar-sep {
  width: 1px;
  height: 18px;
  background: #44475a;
  flex-shrink: 0;
}

.cs-container-header {
  background: rgba(189,147,249,0.07) !important;
}

.cs-fold-placeholder {
  display: inline-block;
  padding: 0 6px;
  background: #383a4a;
  border: 1px solid #44475a;
  border-radius: 3px;
  color: #6272a4;
  font-size: 11px;
  cursor: pointer;
}
.cs-fold-placeholder:hover { border-color: #bd93f9; color: #bd93f9; }

/* ── Main layout ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Editor pane ── */
#editor-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 200px;
  overflow: hidden;
}

.CodeMirror {
  flex: 1;
  height: 100%;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
}

.CodeMirror-scroll { height: 100%; }

/* ChoiceScript syntax colours on dracula base */
.cm-cs-command-flow  { color: #ff79c6; font-weight: bold; }
.cm-cs-command-nav   { color: #bd93f9; }
.cm-cs-command-var   { color: #8be9fd; }
.cm-cs-command-other { color: #50fa7b; }
.cm-cs-command-ext   { color: #ffb86c; font-weight: bold; }
.cm-cs-unknown       { color: #ff5555; text-decoration: underline wavy #ff5555; }
.cm-cs-label-def     { color: #f1fa8c; font-weight: bold; }
.cm-cs-label-ref     { color: #f1fa8c; cursor: pointer; }
.cm-cs-label-ref:hover { text-decoration: underline; }
.cm-cs-option        { color: #50fa7b; font-style: italic; }
.cm-cs-interpolation { color: #8be9fd; }
.cm-cs-stat-op       { color: #ffb86c; font-weight: bold; }

/* ── Error panel ── */
#error-panel {
  background: #3d1010;
  color: #ff5555;
  padding: 5px 12px;
  font-size: 12px;
  font-family: monospace;
  display: none;
  flex-shrink: 0;
  border-top: 1px solid #ff5555;
  white-space: pre-wrap;
}
#error-panel.visible { display: block; }

/* ── Resizer ── */
#resizer {
  width: 4px;
  background: #44475a;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
}
#resizer:hover, #resizer.dragging { background: #bd93f9; }

/* ── Preview pane ── */
#preview-pane {
  width: 420px;
  min-width: 180px;
  max-width: 70vw;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #44475a;
  overflow: hidden;
}

#preview-tabs {
  display: flex;
  background: #282a36;
  border-bottom: 1px solid #44475a;
  flex-shrink: 0;
}

.ptab {
  padding: 6px 16px;
  font-size: 12px;
  color: #6272a4;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  user-select: none;
  transition: color 0.15s;
}
.ptab:hover { color: #f8f8f2; }
.ptab.active { color: #f8f8f2; border-bottom-color: #bd93f9; }

#preview-frame {
  flex: 1;
  border: none;
  background: #fff;
  display: block;
}

/* ── Stats panel ── */
#stats-panel {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 0;
}
#stats-panel.visible { display: flex; }

.sp-section {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #6272a4;
  margin-bottom: 8px;
  margin-top: 4px;
}

.sp-empty {
  color: #44475a;
  font-size: 12px;
  font-style: italic;
  margin-bottom: 12px;
}

/* Choice selector */
.cs-block {
  margin-bottom: 10px;
}
.cs-label {
  font-size: 11px;
  color: #8be9fd;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cs-label span { color: #6272a4; font-size: 10px; }
.cs-select {
  width: 100%;
  background: #383a4a;
  color: #f8f8f2;
  border: 1px solid #44475a;
  padding: 3px 6px;
  border-radius: 3px;
  font-size: 11px;
  cursor: pointer;
}
.cs-select:focus { outline: 1px solid #bd93f9; }

/* Stat bars */
.sp-divider {
  border: none;
  border-top: 1px solid #44475a;
  margin: 10px 0;
}

.stat-row {
  margin-bottom: 8px;
}
.stat-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 3px;
}
.stat-name { color: #f8f8f2; }
.stat-val  { color: #6272a4; }
.stat-bar {
  height: 4px;
  background: #383a4a;
  border-radius: 2px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.25s ease;
}
.stat-fill.opposed { background: linear-gradient(90deg, #bd93f9, #ff79c6); }
.stat-fill.percent { background: #ffb86c; }
.stat-fill.integer { background: #50fa7b; }
.stat-fill.wound   { background: #ff5555; }

/* Opposed pair labels */
.opposed-labels {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: #44475a;
  margin-top: 1px;
}

/* ── Status bar ── */
#statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 10px;
  background: #44475a;
  font-size: 11px;
  color: #f8f8f2;
  flex-shrink: 0;
}
</style>

<body>

<div id="toolbar">
  <span class="logo">CS</span>
  <select id="scene-select" title="Switch scene"></select>
  <button class="btn" id="btn-new-scene" title="New scene file">＋</button>
  <span class="toolbar-sep"></span>
  <div id="container-wrap" title="Jump to container section">
    <div id="container-display"><span id="container-label">(Full file)</span> <span id="container-arrow" style="font-size:9px;opacity:0.6">▾</span></div>
    <div id="container-panel"></div>
  </div>
  <button class="btn" id="btn-preview-container" title="Preview this section with simulated stats" style="display:none">▶ Here</button>
  <button class="btn primary" id="btn-preview">▶ Preview</button>
  <span id="save-indicator"></span>

</div>

<div id="main">
  <div id="editor-pane">

  </div>
</div>

<div id="statusbar">
  <span id="status-left">Ready</span>
  <span id="status-right"></span>
</div>

<script>
'use strict';

const STAT_VARS = new Set(['brutality','cunning','disdain','infamy','wealth','wounds','blasphemy']);
const FAIRMATH_VARS = new Set(['brutality','cunning','disdain','infamy']);
const OPPOSED_PAIRS = [
  {name:'brutality', lo:'Finesse', hi:'Brutality'},
  {name:'cunning',   lo:'Honor',   hi:'Cunning'},
  {name:'disdain',   lo:'Vigilance', hi:'Disdain'},
];
const INTEGER_STATS = ['wealth','wounds','blasphemy'];

const CMD_FLOW   = new Set(['if','elseif','else','endif','choice','fake_choice','for','switch','case','default','endswitch']);
const CMD_NAV    = new Set(['goto','goto_scene','goto_random_scene','gotoref','finish','ending','return','abort','bug','gosub','gosub_scene','redirect_scene']);
const CMD_VAR    = new Set(['create','temp','set','setref','rand','input_text','input_number','print','create_array','temp_array','delete_array','params']);
const CMD_EXT    = new Set(['for','next','switch','case','default','endswitch','push','pop']);
const CMD_OTHER  = new Set(['label','stat_chart','achievement','achieve','check_achievements','page_break','line_break','comment','image','text_image','sound','link','link_button','title','author','scene_list','looplimit','reset','restart','script','save_game','restore_game','save_checkpoint','restore_checkpoint','selectable_if','hide_reuse','disable_reuse','allow_reuse']);

const ALL_CMDS = [...CMD_FLOW,...CMD_NAV,...CMD_VAR,...CMD_OTHER,...CMD_EXT,'next'].sort();

const FUNCTIONS = [
  {name:'floor',     sig:'floor(n)',      doc:'Round down to nearest integer'},
  {name:'ceil',      sig:'ceil(n)',       doc:'Round up to nearest integer'},
  {name:'abs',       sig:'abs(n)',        doc:'Absolute value'},
  {name:'min',       sig:'min(a, b)',     doc:'Smaller of two values'},
  {name:'max',       sig:'max(a, b)',     doc:'Larger of two values'},
  {name:'lowercase', sig:'lowercase(s)',  doc:'Convert to lowercase'},
  {name:'uppercase', sig:'uppercase(s)',  doc:'Convert to uppercase'},
  {name:'round',     sig:'round(n)',      doc:'Round to nearest integer'},
  {name:'length',    sig:'length(s)',     doc:'String length'},
  {name:'not',       sig:'not(v)',        doc:'Boolean inverse'},
  {name:'log',       sig:'log(n)',        doc:'Base-10 logarithm'},
];

// Cmds where the next token is a label reference
const LABEL_REF_CMDS = new Set(['goto','gosub','label']);

CodeMirror.defineMode('choicescript', function() {
  const labelRefAfter = new Set(['goto','gosub','label']);
  const labelDefCmd   = 'label';

  return {
    startState() {
      return {
        inComment: false,
        afterCmd: null,
        expectLabel: false,
      };
    },

    token(stream, state) {
      if (stream.sol()) {
        state.inComment = false;
        // Don't reset afterCmd/expectLabel here; token may span mid-line
      }

      if (state.inComment) {
        stream.skipToEnd();
        return null; // already styled via startState path below
      }

      if (stream.eatSpace()) return null;

      const ch = stream.peek();

      if (stream.match(/\$!{0,2}\{/)) {
        let depth = 1;
        while (!stream.eol()) {
          const c = stream.next();
          if (c === '{') depth++;
          if (c === '}') { if (--depth === 0) break; }
        }
        return 'cs-interpolation';
      }

      if (stream.match('@{')) {
        let depth = 1;
        while (!stream.eol()) {
          const c = stream.next();
          if (c === '{') depth++;
          if (c === '}') { if (--depth === 0) break; }
        }
        return 'cs-interpolation';
      }

      if (ch === '*') {
        stream.next();
        stream.eatWhile(/\w/);
        const full = stream.current(); // includes the *
        const cmd = full.slice(1).toLowerCase();

        if (cmd === 'comment') {
          state.inComment = true;
          stream.skipToEnd();
          return 'comment';
        }

        state.afterCmd = cmd;
        state.expectLabel = labelRefAfter.has(cmd);

        if (CMD_EXT.has(cmd) || cmd === 'next') return 'cs-command-ext';
        if (CMD_FLOW.has(cmd))  return 'cs-command-flow';
        if (CMD_NAV.has(cmd))   return 'cs-command-nav';
        if (CMD_VAR.has(cmd))   return 'cs-command-var';
        if (CMD_OTHER.has(cmd)) return 'cs-command-other';
        return 'cs-unknown';
      }

      if (ch === '#' && stream.indentation() === stream.column()) {
        stream.next();
        stream.skipToEnd();
        return 'cs-option';
      }

      if (ch === '%') {
        if (stream.match('%+') || stream.match('%-')) {
          return 'cs-stat-op';
        }
      }

      if (ch === '"') {
        stream.next();
        while (!stream.eol()) {
          const c = stream.next();
          if (c === '\\') { stream.next(); }
          else if (c === '"') { break; }
        }
        return 'string';
      }

      if (/\d/.test(ch)) {
        stream.eatWhile(/[\d.]/);
        return 'number';
      }

      if (/[\w]/.test(ch)) {
        stream.eatWhile(/\w/);
        const word = stream.current();

        if (state.expectLabel) {
          state.expectLabel = false;
          return state.afterCmd === labelDefCmd ? 'cs-label-def' : 'cs-label-ref';
        }

        if (FUNCTIONS.some(f => f.name === word.toLowerCase()) && stream.peek() === '(') {
          return 'builtin';
        }

        return 'variable';
      }

      if (/[+\-*/=<>!&|]/.test(ch)) {
        stream.eatWhile(/[+\-*/=<>!&|]/);
        return 'operator';
      }

      stream.next();
      return null;
    }
  };
});

CodeMirror.defineMIME('text/x-choicescript', 'choicescript');

// Register token styles with CM's stylesheet
(function() {
  const s = document.createElement('style');
  s.textContent = `
    .cm-cs-command-flow  { color: #ff79c6; font-weight: bold; }
    .cm-cs-command-nav   { color: #bd93f9; }
    .cm-cs-command-var   { color: #8be9fd; }
    .cm-cs-command-other { color: #50fa7b; }
    .cm-cs-command-ext   { color: #ffb86c; font-weight: bold; }
    .cm-cs-unknown       { color: #ff5555; text-decoration: underline; }
    .cm-cs-label-def     { color: #f1fa8c; font-weight: bold; }
    .cm-cs-label-ref     { color: #f1fa8c; cursor: pointer; }
    .cm-cs-label-ref:hover { text-decoration: underline; }
    .cm-cs-option        { color: #50fa7b; font-style: italic; }
    .cm-cs-interpolation { color: #8be9fd; }
    .cm-cs-stat-op       { color: #ffb86c; font-weight: bold; }
  `;
  document.head.appendChild(s);
})();

let currentScene   = '';
let startingStats  = {brutality:50,cunning:50,disdain:50,infamy:0,wealth:5000,wounds:0,blasphemy:0};
let sceneSelections = {};  // sceneName → {choiceIdx → optionIdx}
let saveTimer      = null;
let statUpdateTimer = null;
let scenes         = [];

const BASE = window.location.origin;

async function apiGet(path) {
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(BASE + path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const editor = CodeMirror.fromTextArea(document.getElementById('cm-target'), {
  mode: 'choicescript',
  theme: 'dracula',
  lineNumbers: true,
  styleActiveLine: true,
  matchBrackets: true,
  indentUnit: 2,
  tabSize: 2,
  indentWithTabs: false,
  lineWrapping: false,
  foldGutter: true,
  gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
  foldOptions: {rangeFinder: CodeMirror.fold.indent},
  extraKeys: {
    'Tab': cm => cm.execCommand('indentMore'),
    'Shift-Tab': cm => cm.execCommand('indentLess'),
    'Ctrl-Space': cm => CodeMirror.showHint(cm, csHint),
    'Ctrl-S': () => saveNow(),
    'Ctrl-Q': cm => cm.foldCode(cm.getCursor()),
  },
});

editor.setSize('100%', '100%');

function extractLabels(text) {
  const labels = [];
  for (const line of text.split('\n')) {
    const m = line.trim().match(/^\*label\s+(\w+)/i);
    if (m) labels.push(m[1]);
  }
  return labels;
}

function extractVars(text) {
  const vars = new Set([...STAT_VARS]);
  for (const line of text.split('\n')) {
    const m = line.trim().match(/^\*(?:create|temp)\s+(\w+)/i);
    if (m) vars.add(m[1].toLowerCase());
  }
  return [...vars].sort();
}

function csHint(cm) {
  const cur     = cm.getCursor();
  const line    = cm.getLine(cur.line);
  const token   = cm.getTokenAt(cur);
  const before  = line.slice(0, cur.ch);
  const text    = cm.getValue();

  // After * → command list
  const cmdMatch = before.match(/\*(\w*)$/);
  if (cmdMatch) {
    const prefix = cmdMatch[1].toLowerCase();
    const list   = ALL_CMDS.filter(c => c.startsWith(prefix));
    return {
      list: list.map(c => ({text: c, displayText: '*' + c})),
      from: CodeMirror.Pos(cur.line, cur.ch - cmdMatch[1].length),
      to: cur,
    };
  }

  // After *goto / *gosub → label names
  const navMatch = before.match(/\*(?:goto|gosub)\s+(\w*)$/i);
  if (navMatch) {
    const prefix = navMatch[1].toLowerCase();
    const labels = extractLabels(text).filter(l => l.toLowerCase().startsWith(prefix));
    return {
      list: labels,
      from: CodeMirror.Pos(cur.line, cur.ch - navMatch[1].length),
      to: cur,
    };
  }

  // After *set / *if / *create / *temp → variable names + functions
  const varCmdMatch = before.match(/\*(?:set|if|elseif|create|temp)\s+(\w*)$/i);
  if (varCmdMatch) {
    const prefix  = varCmdMatch[1].toLowerCase();
    const varList = extractVars(text).filter(v => v.startsWith(prefix));
    return {
      list: varList,
      from: CodeMirror.Pos(cur.line, cur.ch - varCmdMatch[1].length),
      to: cur,
    };
  }

  // Mid-expression identifier → vars + functions
  const identMatch = before.match(/\b(\w+)$/);
  if (identMatch) {
    const prefix = identMatch[1].toLowerCase();
    const vars   = extractVars(text).filter(v => v.startsWith(prefix));
    const fns    = FUNCTIONS.filter(f => f.name.startsWith(prefix)).map(f => ({
      text: f.name,
      displayText: f.sig,
      hint(cm, data, completion) {
        cm.replaceRange(f.name + '()', data.from, data.to);
        cm.setCursor({line: data.from.line, ch: data.from.ch + f.name.length + 1});
      },
    }));
    const list = [...fns, ...vars];
    if (!list.length) return;
    return {
      list,
      from: CodeMirror.Pos(cur.line, cur.ch - identMatch[1].length),
      to: cur,
    };
  }
}

// Returns the deepest container whose [line, endLine] contains targetLine, or null.
function containerForLine(items, targetLine) {
  let best = null;
  for (const item of items) {
    if (item.line <= targetLine && targetLine <= item.endLine) {
      if (!best || item.depth > best.depth) best = item;
    }
  }
  return best;
}

editor.getWrapperElement().addEventListener('click', e => {
  const coords = { left: e.clientX, top: e.clientY };
  const pos    = editor.coordsChar(coords, 'window');
  const tok    = editor.getTokenAt(pos);
  if (!tok.type || !tok.type.includes('cs-label-ref')) return;

  const target = tok.string.trim().toLowerCase();
  const text   = editor.getValue();
  const lines  = text.split('\n');

  for (let i = 0; i < lines.length; i++) {
    const m = lines[i].trimStart().match(/^\*label\s+(\S+)/i);
    if (!m || m[1].toLowerCase() !== target) continue;

    // If currently scoped, check whether the destination is outside that scope.
    if (selectedContainerLine) {
      const items   = parseContainers(text);
      const current = items.find(c => String(c.line) === selectedContainerLine);
      const outside = !current || i < current.line || i > current.endLine;

      if (outside) {
        const dest = containerForLine(items, i);
        if (dest) {
          selectContainer(String(dest.line), dest.name);
        } else {
          selectContainer('', '(Full file)');
        }
      }
    }

    editor.setCursor({ line: i, ch: 0 });
    editor.scrollIntoView({ line: i, ch: 0 }, 120);
    editor.focus();
    return;
  }
});

function parseStartingStats(startupText) {
  const stats = {brutality:50,cunning:50,disdain:50,infamy:0,wealth:5000,wounds:0,blasphemy:0};
  for (const line of startupText.split('\n')) {
    const m = line.trim().match(/^\*create\s+(\w+)\s+(.+)/i);
    if (m) {
      const v = m[1].toLowerCase();
      if (STAT_VARS.has(v)) {
        const n = parseFloat(m[2]);
        if (!isNaN(n)) stats[v] = n;
      }
    }
  }
  return stats;
}

// Tracks which branch the cursor is in to filter to the path leading here.
function parseStatChoices(text, cursorLine) {
  const lines    = text.split('\n');
  const results  = [];

  parseBlock(lines, 0, cursorLine, -1, results);
  return results;
}

function getIndent(line) {
  const m = line.match(/^(\s*)/);
  return m ? m[1].length : 0;
}

function parseBlock(lines, startLine, cursorLine, blockIndent, out) {
  let i = startLine;
  while (i < cursorLine) {
    const raw     = lines[i] || '';
    const trimmed = raw.trim();
    if (!trimmed) { i++; continue; }
    const indent = getIndent(raw);

    // Stop if we've left the block we were called to parse
    if (blockIndent >= 0 && indent <= blockIndent && i > startLine) break;

    if (/^\*(?:choice|fake_choice)\b/i.test(trimmed)) {
      const choiceIndent = indent;
      const choice = extractChoice(lines, i, cursorLine, choiceIndent);
      if (choice.options.some(o => o.statSets.length > 0)) {
        out.push(choice);
      }
      const cursorBranch = choice.options.find(o =>
        o.bodyStart <= cursorLine && cursorLine < o.bodyEnd
      );
      if (cursorBranch) {
        parseBlock(lines, cursorBranch.bodyStart, cursorLine, choiceIndent + 1, out);
      }
      i = choice.endLine;
    } else {
      i++;
    }
  }
}

function extractChoice(lines, choiceLine, limitLine, choiceIndent) {
  const options = [];
  let i = choiceLine + 1;
  let endLine = i;

  while (i < limitLine && i < lines.length) {
    const raw     = lines[i] || '';
    const trimmed = raw.trim();
    if (!trimmed) { i++; continue; }
    const indent = getIndent(raw);

    // Stop when we return to choice level or above (but allow *if etc as guards)
    if (indent <= choiceIndent && !/^\*(?:if|elseif|else|hide_reuse|disable_reuse|allow_reuse|selectable_if)\b/i.test(trimmed)) {
      break;
    }

    if (trimmed.startsWith('#')) {
      const optText   = trimmed.slice(1).trim();
      const optIndent = indent;
      const bodyStart = i + 1;
      i++;

      while (i < limitLine && i < lines.length) {
        const bl     = lines[i] || '';
        const bt     = bl.trim();
        if (!bt) { i++; continue; }
        if (getIndent(bl) <= optIndent) break;
        i++;
      }
      const bodyEnd  = i;
      const statSets = extractStatSets(lines, bodyStart, bodyEnd);
      options.push({text: optText, bodyStart, bodyEnd, statSets});
      endLine = i;
    } else {
      i++;
    }
  }

  return {choiceLine, endLine: Math.max(endLine, i), options};
}

function extractStatSets(lines, start, end) {
  const sets = [];
  for (let i = start; i < end && i < lines.length; i++) {
    const t = (lines[i] || '').trim();
    const m = t.match(/^\*set\s+(\w+)\s+(.*)/i);
    if (m) {
      const v = m[1].toLowerCase();
      if (STAT_VARS.has(v)) sets.push({var: v, expr: m[2].trim()});
    }
  }
  return sets;
}

function fairAdd(v, n) {
  return Math.min(100, Math.round(v + (100 - v) * n / 100));
}
function fairSub(v, n) {
  return Math.max(0, Math.round(v - v * n / 100));
}

function applySet(stats, varName, expr) {
  const cur = stats[varName] !== undefined ? stats[varName] : 0;

  const fairPlus  = expr.match(/^%\+(\d+)/);
  const fairMinus = expr.match(/^%-(\d+)/);
  const addMatch  = expr.match(/^\+(\d+)/);
  const subMatch  = expr.match(/^-(\d+)/);
  const numMatch  = expr.match(/^(\d+)$/);

  if (fairPlus)  stats[varName] = fairAdd(cur, parseInt(fairPlus[1]));
  else if (fairMinus) stats[varName] = fairSub(cur, parseInt(fairMinus[1]));
  else if (addMatch)  stats[varName] = cur + parseInt(addMatch[1]);
  else if (subMatch)  stats[varName] = cur - parseInt(subMatch[1]);
  else if (numMatch)  stats[varName] = parseInt(numMatch[1]);
  // Complex expressions: skip (can't evaluate without full engine)
}

function simulateStats(choices, selections, starting) {
  const stats = Object.assign({}, starting);
  choices.forEach(choice => {
    // Key by choiceLine so selections survive cursor movement and branch changes
    const selIdx = selections[choice.choiceLine] !== undefined ? selections[choice.choiceLine] : 0;
    const option = choice.options[selIdx];
    if (!option) return;
    option.statSets.forEach(s => applySet(stats, s.var, s.expr));
  });
  return stats;
}

function updateStatsPanel() {
  const sp = document.getElementById('stats-panel');
  if (!sp.classList.contains('visible') && sp.style.display !== 'flex') return;

  const cursorLine = editor.getCursor().line;
  const text       = editor.getValue();
  const choices    = parseStatChoices(text, cursorLine);

  if (!sceneSelections[currentScene]) sceneSelections[currentScene] = {};
  const sels = sceneSelections[currentScene];

  const cl = document.getElementById('choice-list');
  cl.innerHTML = '';

  if (choices.length === 0) {
    const empty = document.createElement('div');
    empty.className   = 'sp-empty';
    empty.textContent = 'No stat-affecting choices before cursor.';
    cl.appendChild(empty);
  } else {
    choices.forEach((choice, ci) => {
      const block = document.createElement('div');
      block.className = 'cs-block';

      const label = document.createElement('div');
      label.className = 'cs-label';
      const snippet = getChoiceContext(text, choice.choiceLine);
      label.innerHTML = snippet
        ? `<span>Choice ${ci+1}:</span> ${esc(snippet)}`
        : `<span>Choice ${ci+1}</span>`;
      block.appendChild(label);

      const sel = document.createElement('select');
      sel.className = 'cs-select';

      // Only options that have stat effects get distinct labels; others just show the text
      choice.options.forEach((opt, oi) => {
        const o = document.createElement('option');
        o.value = oi;
        const marker = opt.statSets.length ? ` [${opt.statSets.map(s => s.var).join(', ')}]` : '';
        o.textContent = opt.text + marker;
        sel.appendChild(o);
      });

      sel.value = sels[choice.choiceLine] !== undefined ? sels[choice.choiceLine] : 0;

      sel.addEventListener('change', () => {
        sels[choice.choiceLine] = parseInt(sel.value);
        renderStatBars(simulateStats(choices, sels, startingStats));
      });

      block.appendChild(sel);
      cl.appendChild(block);
    });
  }

  renderStatBars(simulateStats(choices, sels, startingStats));
}

function getChoiceContext(text, choiceLine) {
  const lines = text.split('\n');
  for (let i = choiceLine - 1; i >= Math.max(0, choiceLine - 5); i--) {
    const t = (lines[i] || '').trim();
    if (t && !t.startsWith('*') && !t.startsWith('#')) {
      return t.length > 48 ? t.slice(0, 45) + '…' : t;
    }
  }
  return '';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderStatBars(stats) {
  const el = document.getElementById('stat-bars');
  el.innerHTML = '';

  OPPOSED_PAIRS.forEach(p => {
    const v = Math.max(0, Math.min(100, stats[p.name] || 0));
    el.appendChild(makeBar(p.name, v, 100, 'opposed', p.lo, p.hi));
  });

  el.appendChild(makeBar('infamy', Math.max(0,Math.min(100,stats.infamy||0)), 100, 'percent'));

  // Integers: normalize for display only
  const wealthMax = Math.max(stats.wealth || 0, startingStats.wealth || 5000, 1);
  el.appendChild(makeBar('wealth', stats.wealth||0, wealthMax, 'integer'));
  el.appendChild(makeBar('wounds', Math.max(0, Math.min(5, stats.wounds||0)), 5, 'wound'));
  el.appendChild(makeBar('blasphemy', stats.blasphemy||0, 3, 'wound'));
}

function makeBar(name, value, max, kind, loLabel, hiLabel) {
  const row = document.createElement('div');
  row.className = 'stat-row';

  const hdr = document.createElement('div');
  hdr.className = 'stat-header';

  const nm = document.createElement('span');
  nm.className   = 'stat-name';
  nm.textContent = name.charAt(0).toUpperCase() + name.slice(1);
  const vl = document.createElement('span');
  vl.className   = 'stat-val';
  vl.textContent = kind === 'opposed' ? value + '/100' : value;

  hdr.appendChild(nm); hdr.appendChild(vl);
  row.appendChild(hdr);

  const bar = document.createElement('div');
  bar.className = 'stat-bar';
  const fill = document.createElement('div');
  fill.className = 'stat-fill ' + kind;
  fill.style.width = Math.round(value / max * 100) + '%';
  bar.appendChild(fill);
  row.appendChild(bar);

  if (loLabel || hiLabel) {
    const lbl = document.createElement('div');
    lbl.className = 'opposed-labels';
    lbl.innerHTML = `<span>${esc(loLabel||'')}</span><span>${esc(hiLabel||'')}</span>`;
    row.appendChild(lbl);
  }

  return row;
}

// ── Container markers ──────────────────────────────────────────────────────

// Matches *comment =, ==, ===, ==== … depth is the = count, name is everything after
const CONTAINER_RE = /^\*comment\s+(=+)\s*(.+)/i;

// Left-border color per depth level; cycles when depth exceeds palette length
const DEPTH_COLORS = ['#bd93f9','#8be9fd','#50fa7b','#ffb86c','#ff79c6','#f1fa8c'];
function depthColor(d) { return DEPTH_COLORS[(d - 1) % DEPTH_COLORS.length]; }

let containerMarks        = [];
let containerLineClasses  = [];
let selectedContainerLine = '';
// Keyed by line number string so toggle state survives re-syncs within the same scene
let expandedContainers    = new Set();

function parseContainers(text) {
  const rawLines = text.split('\n');
  const lastLine = rawLines.length - 1;
  const items    = [];

  for (let i = 0; i < rawLines.length; i++) {
    const m = rawLines[i].match(CONTAINER_RE);
    if (m) items.push({depth: m[1].length, name: m[2].trim(), line: i, endLine: lastLine});
  }

  // A container ends before the next container at the same or shallower depth
  for (let i = 0; i < items.length; i++) {
    for (let j = i + 1; j < items.length; j++) {
      if (items[j].depth <= items[i].depth) {
        items[i].endLine = items[j].line - 1;
        break;
      }
    }
  }

  return items;
}

function buildTree(items) {
  const roots = [];
  const stack = [];

  items.forEach(item => {
    const node = {item, children: []};
    while (stack.length && stack[stack.length - 1].item.depth >= item.depth) stack.pop();
    if (stack.length === 0) {
      roots.push(node);
    } else {
      stack[stack.length - 1].children.push(node);
    }
    stack.push(node);
  });

  return roots;
}

function selectContainer(lineKey, label) {
  selectedContainerLine = lineKey;
  document.getElementById('container-label').textContent = label || '(Full file)';
  document.getElementById('container-panel').classList.remove('open');
  document.getElementById('container-display').classList.remove('open');
  document.getElementById('btn-preview-container').style.display = lineKey ? 'inline-block' : 'none';
  applyContainerScope(lineKey);
}

async function previewContainer() {
  if (!selectedContainerLine) return;

  const text  = editor.getValue();
  const items = parseContainers(text);
  const item  = items.find(c => String(c.line) === selectedContainerLine);
  if (!item) return;

  const lines     = text.split('\n');
  const startLine = item.line;
  const endLine   = item.endLine;

  const choices = parseStatChoices(text, startLine);
  const sels    = sceneSelections[currentScene] || {};
  const stats   = simulateStats(choices, sels, startingStats);

  const statsForUrl = {};
  for (const [k, v] of Object.entries(stats)) {
    statsForUrl[k] = Math.round(Number(v) || 0);
  }

  // *temp declarations let *set commands in the container work without startup.txt
  const tempHeader = [...STAT_VARS].map(v => `*temp ${v} ${Math.round(Number(stats[v]) || 0)}`).join('\n');
  const content = tempHeader + '\n' + lines.slice(startLine, endLine + 1).join('\n');
  try {
    await apiPost('/api/scene/_container_preview', {content});
  } catch (e) {
    alert('Could not write preview scene: ' + e.message);
    return;
  }

  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.querySelector('.ptab[data-tab="game"]').classList.add('active');
  document.getElementById('preview-frame').style.display = 'block';
  document.getElementById('stats-panel').style.display   = 'none';

  const frame = document.getElementById('preview-frame');
  const statsParam = encodeURIComponent(JSON.stringify(statsForUrl));
  frame.src = `${BASE}/web/mygame/?t=${Date.now()}&forcedScene=_container_preview&forcedStats=${statsParam}`;
}

function syncContainerDropdown() {
  const prev  = selectedContainerLine;
  const items = parseContainers(editor.getValue());
  const panel = document.getElementById('container-panel');

  panel.innerHTML = '';

  const fullItem = document.createElement('div');
  fullItem.className = 'co-item co-full';
  fullItem.textContent = '(Full file)';
  fullItem.addEventListener('click', () => selectContainer('', '(Full file)'));
  panel.appendChild(fullItem);

  function renderNode(node, parentEl) {
    const {item, children} = node;
    const key   = String(item.line);
    const color = depthColor(item.depth);
    const indent = (item.depth - 1) * 14;
    const isExpanded = expandedContainers.has(key);

    const row = document.createElement('div');
    row.className = 'co-item';
    row.style.paddingLeft = (8 + indent) + 'px';
    row.style.color = color;

    const toggle = document.createElement('span');
    toggle.className = 'co-toggle' + (children.length ? (isExpanded ? ' expanded' : '') : '');
    toggle.textContent = children.length ? (isExpanded ? '▾' : '▸') : '◦';
    row.appendChild(toggle);

    const label = document.createElement('span');
    label.className = 'co-label';
    label.textContent = item.name;
    row.appendChild(label);

    label.addEventListener('click', e => {
      e.stopPropagation();
      selectContainer(key, item.name);
    });

    if (children.length) {
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        if (expandedContainers.has(key)) {
          expandedContainers.delete(key);
        } else {
          expandedContainers.add(key);
        }
        syncContainerDropdown();
      });
      row.addEventListener('click', () => selectContainer(key, item.name));
    } else {
      row.addEventListener('click', () => selectContainer(key, item.name));
    }

    parentEl.appendChild(row);

    if (children.length) {
      const childWrap = document.createElement('div');
      childWrap.className = 'co-children' + (isExpanded ? '' : ' collapsed');
      children.forEach(child => renderNode(child, childWrap));
      parentEl.appendChild(childWrap);
    }
  }

  const tree = buildTree(items);
  // Auto-expand depths 1 and 2 on first render; preserved if user manually collapsed them
  items.forEach(item => {
    if (item.depth <= 2) {
      const key = String(item.line);
      if (!expandedContainers.has(key)) expandedContainers.add(key);
    }
  });
  tree.forEach(node => renderNode(node, panel));

  // Depth-colored left border applied via inline style; addLineClass alone can't carry color
  containerLineClasses.forEach(({line}) => {
    editor.removeLineClass(line, 'wrap', 'cs-container-header');
  });
  containerLineClasses = [];
  items.forEach(item => {
    editor.addLineClass(item.line, 'wrap', 'cs-container-header');
    const el = editor.getLineHandle(item.line);
    if (el && el.wrapClass !== undefined) {
      // rAF needed because CM hasn't written the DOM element yet at this point
      requestAnimationFrame(() => {
        const lineEl = editor.getWrapperElement()
          .querySelector(`.CodeMirror-code > div:nth-child(${item.line + 1})`);
        if (lineEl) {
          lineEl.style.borderLeft = `${Math.max(2, 5 - item.depth)}px solid ${depthColor(item.depth)}`;
        }
      });
    }
    containerLineClasses.push(item);
  });

  // If the previously selected container was renamed/deleted, reset to full file
  if (prev && !items.some(c => String(c.line) === prev)) {
    selectedContainerLine = '';
    document.getElementById('container-label').textContent = '(Full file)';
    applyContainerScope('');
  }
}

function makeFoldWidget(label) {
  const el = document.createElement('span');
  el.className   = 'cs-fold-placeholder';
  el.textContent = ` ··· ${label} ··· `;
  return el;
}

function applyContainerScope(lineKey) {
  containerMarks.forEach(m => m.clear());
  containerMarks = [];

  if (!lineKey) return;

  const text  = editor.getValue();
  const lines = text.split('\n');
  const items = parseContainers(text);
  const item  = items.find(c => String(c.line) === lineKey);
  if (!item) return;

  const startLine = item.line;
  const endLine   = item.endLine;

  if (startLine > 0) {
    containerMarks.push(editor.markText(
      {line: 0,             ch: 0},
      {line: startLine - 1, ch: lines[startLine - 1].length},
      {collapsed: true, replacedWith: makeFoldWidget(`${startLine} lines above`), inclusiveLeft: true}
    ));
  }

  const lastLine = editor.lineCount() - 1;
  if (endLine < lastLine) {
    containerMarks.push(editor.markText(
      {line: endLine + 1, ch: 0},
      {line: lastLine,    ch: lines[lastLine].length},
      {collapsed: true, replacedWith: makeFoldWidget(`${lastLine - endLine} lines below`), inclusiveRight: true}
    ));
  }

  editor.scrollIntoView({line: startLine, ch: 0}, 80);
}

document.getElementById('container-display').addEventListener('click', () => {
  const display = document.getElementById('container-display');
  const panel   = document.getElementById('container-panel');
  const open    = panel.classList.toggle('open');
  display.classList.toggle('open', open);
});

document.addEventListener('click', e => {
  const wrap = document.getElementById('container-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('container-panel').classList.remove('open');
    document.getElementById('container-display').classList.remove('open');
  }
});

let containerSyncTimer = null;
editor.on('change', () => {
  clearTimeout(containerSyncTimer);
  containerSyncTimer = setTimeout(syncContainerDropdown, 400);
});

loadSceneList();
</script>
</body>
