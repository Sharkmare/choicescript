<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ChoiceScript Editor — Test Suite</title>
<style>
  body { font-family: Consolas, monospace; background: #282a36; color: #f8f8f2; margin: 0; padding: 20px; }
  h1   { color: #bd93f9; font-size: 16px; margin: 0 0 16px; }
  h2   { color: #8be9fd; font-size: 13px; margin: 24px 0 8px; border-bottom: 1px solid #44475a; padding-bottom: 4px; }
  .pass { color: #50fa7b; }
  .fail { color: #ff5555; }
  .row  { padding: 2px 0; font-size: 12px; }
  .detail { color: #ffb86c; font-size: 11px; padding-left: 20px; }
  #summary { margin-top: 20px; padding: 10px; background: #383a4a; border-radius: 4px; font-size: 13px; }
  #summary.all-pass { border-left: 4px solid #50fa7b; }
  #summary.has-fail  { border-left: 4px solid #ff5555; }
</style>
</head>
<body>
<h1>ChoiceScript Editor — Test Suite</h1>
<div id="output"></div>
<div id="summary"></div>

<!-- Engine dependencies -->
<script src="../web/util.js"></script>
<script src="../web/scene.js"></script>

<script>
// ── Minimal browser stubs scene.js may reference at call time ───────────────
if (typeof println === 'undefined') window.println = () => {};
if (typeof printx  === 'undefined') window.printx  = () => {};
if (typeof alert   === 'undefined') window.alert   = msg => console.warn('alert:', msg);

// ── Test harness ─────────────────────────────────────────────────────────────
const results = [];
let currentSuite = '';

function suite(name) { currentSuite = name; }

function test(name, fn) {
  try {
    fn();
    results.push({suite: currentSuite, name, pass: true});
  } catch (e) {
    results.push({suite: currentSuite, name, pass: false, error: e.message});
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'Assertion failed');
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || '') + ` expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}

function assertNoThrow(fn) {
  try { fn(); } catch (e) { throw new Error('Unexpected error: ' + e.message); }
}

// ── Minimal Scene factory for parseOptions tests ─────────────────────────────
function makeScene(lines) {
  const scene = new Scene('test', {brutality: 50}, null, {});
  scene.lines   = lines;
  scene.lineNum = 0;
  scene.indent  = 0;
  return scene;
}

// ── parseOptions — *comment handling ─────────────────────────────────────────
suite('parseOptions — *comment handling');

test('comment between *choice and first option does not throw', () => {
  const scene = makeScene([
    '*choice',
    '  *comment setup',
    '  #Option A',
    '    *finish',
    '  #Option B',
    '    *finish',
  ]);
  scene.lineNum = 0;
  assertNoThrow(() => scene.parseOptions(0, ['choice'], true));
});

test('comment between *choice and first option still yields correct option count', () => {
  const scene = makeScene([
    '*choice',
    '  *comment This is a comment',
    '  #Red',
    '    *finish',
    '  #Blue',
    '    *finish',
  ]);
  scene.lineNum = 0;
  let opts;
  assertNoThrow(() => { opts = scene.parseOptions(0, ['choice'], true); });
  assertEqual(opts.length, 2, 'option count:');
  assertEqual(opts[0].name, 'Red', 'first option name:');
  assertEqual(opts[1].name, 'Blue', 'second option name:');
});

test('comment between options does not break parsing', () => {
  const scene = makeScene([
    '*choice',
    '  #Alpha',
    '    *finish',
    '  *comment mid-choice comment',
    '  #Beta',
    '    *finish',
  ]);
  scene.lineNum = 0;
  let opts;
  assertNoThrow(() => { opts = scene.parseOptions(0, ['choice'], true); });
  assertEqual(opts.length, 2, 'option count:');
});

test('multiple comments scattered through choice block parse correctly', () => {
  const scene = makeScene([
    '*choice',
    '  *comment Before options',
    '  #First',
    '    *comment Inside body',
    '    *finish',
    '  *comment Between options',
    '  #Second',
    '    *finish',
    '  *comment After last option',
  ]);
  scene.lineNum = 0;
  let opts;
  assertNoThrow(() => { opts = scene.parseOptions(0, ['choice'], true); });
  assertEqual(opts.length, 2, 'option count:');
});

test('*COMMENT (uppercase) is also skipped', () => {
  const scene = makeScene([
    '*choice',
    '  *COMMENT Case insensitive check',
    '  #Only Option',
    '    *finish',
  ]);
  scene.lineNum = 0;
  assertNoThrow(() => scene.parseOptions(0, ['choice'], true));
});

test('choice without comment still works (regression guard)', () => {
  const scene = makeScene([
    '*choice',
    '  #Normal',
    '    *finish',
    '  #Also Normal',
    '    *finish',
  ]);
  scene.lineNum = 0;
  let opts;
  assertNoThrow(() => { opts = scene.parseOptions(0, ['choice'], true); });
  assertEqual(opts.length, 2, 'option count:');
});

// ── parseContainers — n-depth system ─────────────────────────────────────────
suite('parseContainers — n-depth');

const CONTAINER_RE = /^\*comment\s+(=+)\s*(.+)/i;

function parseContainers(text) {
  const rawLines = text.split('\n');
  const lastLine = rawLines.length - 1;
  const items    = [];

  for (let i = 0; i < rawLines.length; i++) {
    const m = rawLines[i].match(CONTAINER_RE);
    if (m) items.push({depth: m[1].length, name: m[2].trim(), line: i, endLine: lastLine});
  }

  // A container ends before the next container at the same or shallower depth
  for (let i = 0; i < items.length; i++) {
    for (let j = i + 1; j < items.length; j++) {
      if (items[j].depth <= items[i].depth) { items[i].endLine = items[j].line - 1; break; }
    }
  }

  return items;
}

test('empty file yields no containers', () => {
  assertEqual(parseContainers('').length, 0);
});

test('single depth-1 container is detected', () => {
  const items = parseContainers('*comment = Act One\nsome text');
  assertEqual(items.length, 1);
  assertEqual(items[0].depth, 1);
  assertEqual(items[0].name, 'Act One');
  assertEqual(items[0].line, 0);
  assertEqual(items[0].endLine, 1);
});

test('depth-2 container is detected', () => {
  const items = parseContainers('*comment == Section One\nsome text');
  assertEqual(items.length, 1);
  assertEqual(items[0].depth, 2);
  assertEqual(items[0].name, 'Section One');
});

test('depth-3 container is detected', () => {
  const items = parseContainers('*comment === Sub section\nsome text');
  assertEqual(items.length, 1);
  assertEqual(items[0].depth, 3);
  assertEqual(items[0].name, 'Sub section');
});

test('depth-7 container is detected', () => {
  const items = parseContainers('*comment ======= Deep\nsome text');
  assertEqual(items.length, 1);
  assertEqual(items[0].depth, 7);
  assertEqual(items[0].name, 'Deep');
});

test('two depth-1 containers: first ends before second begins', () => {
  const text = [
    '*comment = Chapter 1',  // 0
    'some text',             // 1
    '*comment = Chapter 2',  // 2
    'more text',             // 3
  ].join('\n');
  const items = parseContainers(text);
  assertEqual(items.length, 2);
  assertEqual(items[0].endLine, 1, 'chapter 1 end:');
  assertEqual(items[1].endLine, 3, 'chapter 2 end:');
});

test('depth-1 is not cut by its deeper children', () => {
  const text = [
    '*comment = Chapter 1',  // 0
    '*comment == Section A', // 1
    'prose',                 // 2
    '*comment == Section B', // 3
    'more prose',            // 4
    '*comment = Chapter 2',  // 5
  ].join('\n');
  const items = parseContainers(text);
  const ch1 = items.find(i => i.name === 'Chapter 1');
  assertEqual(ch1.endLine, 4, 'depth-1 spans through its children:');
});

test('depth-2 ends before next depth-2 sibling', () => {
  const text = [
    '*comment = Chapter 1',  // 0
    '*comment == Section A', // 1
    'prose',                 // 2
    '*comment == Section B', // 3
    'more prose',            // 4
  ].join('\n');
  const items = parseContainers(text);
  const secA = items.find(i => i.name === 'Section A');
  assertEqual(secA.endLine, 2, 'section A ends before section B:');
});

test('depth-3 ends before next depth-2 (shallower sibling)', () => {
  const text = [
    '*comment = Act',        // 0
    '*comment == Scene',     // 1
    '*comment === Beat',     // 2
    'prose',                 // 3
    '*comment == Scene 2',   // 4
  ].join('\n');
  const items = parseContainers(text);
  const beat = items.find(i => i.name === 'Beat');
  assertEqual(beat.endLine, 3, 'depth-3 ends before depth-2 that follows:');
});

test('names with spaces and punctuation are preserved', () => {
  const items = parseContainers("*comment = The Dragon's Lair, Part II");
  assertEqual(items[0].name, "The Dragon's Lair, Part II");
});

test('plain *comment lines without = are ignored', () => {
  const text = '*comment this is just a note\n*comment = Container';
  const items = parseContainers(text);
  assertEqual(items.length, 1);
  assertEqual(items[0].name, 'Container');
});

test('case insensitive marker detection', () => {
  const items = parseContainers('*COMMENT = Upper Case Chapter');
  assertEqual(items.length, 1);
  assertEqual(items[0].depth, 1);
});

// ── Stats simulation — applySet ───────────────────────────────────────────────
suite('simulateStats — applySet');

const STAT_VARS_TEST = new Set(['brutality','cunning','disdain','infamy','wealth','wounds','blasphemy']);

function fairAdd(v, n) { return Math.min(100, Math.round(v + (100 - v) * n / 100)); }
function fairSub(v, n) { return Math.max(0,   Math.round(v - v * n / 100)); }

function applySet(stats, varName, expr) {
  const cur       = stats[varName] !== undefined ? stats[varName] : 0;
  const fairPlus  = expr.match(/^%\+(\d+)/);
  const fairMinus = expr.match(/^%-(\d+)/);
  const addMatch  = expr.match(/^\+(\d+)/);
  const subMatch  = expr.match(/^-(\d+)/);
  const numMatch  = expr.match(/^(\d+)$/);

  if (fairPlus)       stats[varName] = fairAdd(cur, parseInt(fairPlus[1]));
  else if (fairMinus) stats[varName] = fairSub(cur, parseInt(fairMinus[1]));
  else if (addMatch)  stats[varName] = cur + parseInt(addMatch[1]);
  else if (subMatch)  stats[varName] = cur - parseInt(subMatch[1]);
  else if (numMatch)  stats[varName] = parseInt(numMatch[1]);
}

// simulateStats keyed by choiceLine — matches the editor implementation
function simulateStats(choices, selections, starting) {
  const stats = Object.assign({}, starting);
  choices.forEach(choice => {
    const selIdx = selections[choice.choiceLine] !== undefined ? selections[choice.choiceLine] : 0;
    const option = choice.options[selIdx];
    if (!option) return;
    option.statSets.forEach(s => applySet(stats, s.var, s.expr));
  });
  return stats;
}

const BASE = {brutality:50, cunning:50, disdain:50, infamy:0, wealth:5000, wounds:0, blasphemy:0};

test('fairmath %+ pushes toward 100', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'brutality', '%+10');
  // fairAdd(50, 10) = round(50 + 50*0.10) = 55
  assertEqual(s.brutality, 55);
});

test('fairmath %- pushes toward 0', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'brutality', '%-10');
  // fairSub(50, 10) = round(50 - 50*0.10) = 45
  assertEqual(s.brutality, 45);
});

test('fairmath clamps at 100', () => {
  const s = {brutality: 95};
  applySet(s, 'brutality', '%+100');
  assertEqual(s.brutality, 100);
});

test('fairmath clamps at 0', () => {
  const s = {brutality: 5};
  applySet(s, 'brutality', '%-100');
  assertEqual(s.brutality, 0);
});

test('fairmath uses round not floor: %+15 from 50 gives 58', () => {
  // fairAdd(50, 15): 50 + 50*0.15 = 57.5 → round=58, floor=57
  const s = {brutality: 50};
  applySet(s, 'brutality', '%+15');
  assertEqual(s.brutality, 58, 'round(57.5) must be 58 not 57:');
});

test('plain addition on integer stat', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'wealth', '+500');
  assertEqual(s.wealth, 5500);
});

test('plain subtraction on integer stat', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'wounds', '-1');
  assertEqual(s.wounds, -1);
});

test('direct assignment', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'infamy', '75');
  assertEqual(s.infamy, 75);
});

test('complex expression is silently skipped', () => {
  const s = Object.assign({}, BASE);
  applySet(s, 'wealth', 'other_var+10');
  assertEqual(s.wealth, 5000, 'complex expr must not change stat:');
});

// ── Stats simulation — simulateStats / selection keying ───────────────────────
suite('simulateStats — selection keying');

test('selections keyed by choiceLine apply correctly', () => {
  const choices = [
    { choiceLine: 5,  options: [{ statSets: [{var:'brutality', expr:'%+10'}] }, {statSets:[]}] },
    { choiceLine: 20, options: [{ statSets: [{var:'infamy',    expr:'75'}]    }, {statSets:[]}] },
  ];
  const sels = {5: 0, 20: 0};
  const stats = simulateStats(choices, sels, Object.assign({}, BASE));
  assertEqual(stats.brutality, 55);
  assertEqual(stats.infamy, 75);
});

test('non-default selection at choiceLine is applied', () => {
  const choices = [
    { choiceLine: 10, options: [
      { statSets: [{var:'brutality', expr:'%+20'}] },  // index 0
      { statSets: [{var:'cunning',   expr:'%+20'}] },  // index 1
    ]},
  ];
  const sels = {10: 1};  // select option 1
  const stats = simulateStats(choices, sels, Object.assign({}, BASE));
  assertEqual(stats.brutality, 50, 'option 0 not applied:');
  assertEqual(stats.cunning, fairAdd(50, 20), 'option 1 applied:');
});

test('default selection is index 0 when choiceLine not in sels', () => {
  const choices = [
    { choiceLine: 7, options: [
      { statSets: [{var:'brutality', expr:'%+20'}] },
      { statSets: [{var:'cunning',   expr:'%+20'}] },
    ]},
  ];
  const stats = simulateStats(choices, {}, Object.assign({}, BASE));
  assertEqual(stats.brutality, fairAdd(50, 20), 'option 0 selected by default:');
  assertEqual(stats.cunning, 50, 'option 1 not applied:');
});

test('choiceLine key is stable across different array positions (regression: ci keying broke this)', () => {
  // Simulate: same choice appears at ci=0 in one render, ci=1 in another.
  // With ci keying, sels[0]=1 set when it was first in array, but then when
  // a new choice is prepended it shifts to ci=1 and sels[1] is undefined → defaults to 0.
  // With choiceLine keying, sels[choiceLine] stays correct regardless of position.
  const choiceA = { choiceLine: 5, options: [
    { statSets: [{var:'brutality', expr:'%+10'}] },
    { statSets: [{var:'cunning',   expr:'%+10'}] },
  ]};
  const choiceB = { choiceLine: 15, options: [
    { statSets: [{var:'infamy', expr:'25'}] },
    { statSets: [{var:'infamy', expr:'50'}] },
  ]};

  // User selects option 1 on choiceA when it's at ci=0
  const sels = {};
  sels[choiceA.choiceLine] = 1;

  // Now simulate rendering with a new choiceB prepended (choiceA shifts to ci=1)
  const choices = [choiceB, choiceA];
  const stats = simulateStats(choices, sels, Object.assign({}, BASE));

  // choiceA should still use option 1 (cunning %+10), not option 0
  assertEqual(stats.brutality, 50, 'option 0 of choiceA not applied:');
  assertEqual(stats.cunning, fairAdd(50, 10), 'option 1 of choiceA still applied after reorder:');
  // choiceB has no entry in sels, defaults to option 0 (infamy 25)
  assertEqual(stats.infamy, 25, 'choiceB defaults to option 0:');
});

test('simulateStats applies multiple choices in sequence', () => {
  const choices = [
    { choiceLine: 3,  options: [{ statSets: [{var:'brutality', expr:'%+10'}] }] },
    { choiceLine: 10, options: [{ statSets: [{var:'brutality', expr:'%+10'}] }] },
  ];
  const sels = {};
  const stats = simulateStats(choices, sels, Object.assign({}, BASE));
  // fairAdd(fairAdd(50,10), 10) = fairAdd(55, 10) = round(55 + 45*0.10) = round(59.5) = 60
  assertEqual(stats.brutality, 60, 'two sequential fairmath pushes:');
});

// ── Render ─────────────────────────────────────────────────────────────────────
const out = document.getElementById('output');
let passed = 0, failed = 0;
let currentRenderedSuite = '';

results.forEach(r => {
  if (r.suite !== currentRenderedSuite) {
    const h = document.createElement('h2');
    h.textContent = r.suite;
    out.appendChild(h);
    currentRenderedSuite = r.suite;
  }
  const row = document.createElement('div');
  row.className = 'row';
  if (r.pass) {
    row.innerHTML = `<span class="pass">&#10003;</span> ${r.name}`;
    passed++;
  } else {
    row.innerHTML = `<span class="fail">&#10007;</span> ${r.name}`;
    const detail = document.createElement('div');
    detail.className = 'detail';
    detail.textContent = r.error;
    row.appendChild(detail);
    failed++;
  }
  out.appendChild(row);
});

const summary = document.getElementById('summary');
const total = passed + failed;
summary.textContent = `${passed}/${total} tests passed` + (failed ? ` — ${failed} FAILED` : ' — all green');
summary.className = failed ? 'has-fail' : 'all-pass';
</script>
</body>
</html>
